# .github/workflows/testng-ci.yml
name: TestNG CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run TestNG Suite
        run: mvn test -Dsurefire.suiteXmlFiles=src/test/resources/testng-ex3.xml

      - name: Upload Test Results
        uses: actions/upload-artifact@v3
        with:
          name: testng-reports
          path: target/surefire-reports/