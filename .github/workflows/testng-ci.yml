# .github/workflows/testng-ci.yml
name: TestNG CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run TestNG Suite
        run: mvn test -DsuiteXmlFile=src/test/resources/testing-ex3.xml -Dmaven.test.failure.ignore=true

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: testng-reports
          path: target/surefire-reports/